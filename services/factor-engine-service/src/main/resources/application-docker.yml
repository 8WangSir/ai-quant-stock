server:
  port: 8082

spring:
  application:
    name: factor-engine-service
  datasource:
    url: jdbc:postgresql://postgres:5432/quant_stock?sslmode=disable
    username: quant
    password: quant123
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: redis
      port: 6379

quant:
  python:
    home: /app/python
    executable: python3

xxl:
  job:
    admin:
      addresses: http://xxl-job-admin:8080/xxl-job-admin
    executor:
      appname: factor-engine-service
      port: 9992
      ip: factor-engine-service
    accessToken: default_token

logging:
  file:
    name: /app/logs/factor-engine-service.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
