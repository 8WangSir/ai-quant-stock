server:
  port: 8080

spring:
  application:
    name: admin-service
  datasource:
    url: jdbc:postgresql://postgres:5432/quant_stock?sslmode=disable
    username: quant
    password: quant123
    driver-class-name: org.postgresql.Driver
  data:
