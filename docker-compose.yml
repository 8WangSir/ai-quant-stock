services:
  # 基础设施
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: quant-postgres
    environment:
      POSTGRES_DB: quant_stock
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant123
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant_stock"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quant-network

  redis:
    image: redis:7-alpine
    container_name: quant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - quant-network

  xxl-job-mysql:
    image: mysql:8.0
    container_name: quant-xxl-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: xxl_job
    ports:
      - "3307:3306"
    volumes:
      - xxl_mysql_data:/var/lib/mysql
      - ./sql/tables_xxl_job.sql:/docker-entrypoint-initdb.d/01-xxl-job.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quant-network

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.1
    container_name: quant-xxl-job
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://xxl-job-mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=root
        --spring.datasource.password=root123
    ports:
      - "8088:8080"
    depends_on:
      xxl-job-mysql:
        condition: service_healthy
    networks:
      - quant-network

  # Java 后端服务
  market-data-service:
    build:
      context: .
      dockerfile: services/market-data-service/Dockerfile
    container_name: quant-market-data
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TICKFLOW_API_KEY: ${TICKFLOW_API_KEY:-}
      JUHE_API_KEY: ${JUHE_API_KEY:-}
      MOMAAPI_TOKEN: ${MOMAAPI_TOKEN:-}
      INFOWAY_API_KEY: ${INFOWAY_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      xxl-job-admin:
        condition: service_started
    volumes:
      - market_data_logs:/app/logs
    networks:
      - quant-network

  factor-engine-service:
    build:
      context: .
      dockerfile: services/factor-engine-service/Dockerfile
    container_name: quant-factor-engine
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      xxl-job-admin:
        condition: service_started
      market-data-service:
        condition: service_started
    volumes:
      - factor_engine_logs:/app/logs
    networks:
      - quant-network

  strategy-service:
    build:
      context: .
      dockerfile: services/strategy-service/Dockerfile
    container_name: quant-strategy
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      xxl-job-admin:
        condition: service_started
      factor-engine-service:
        condition: service_started
    volumes:
      - strategy_logs:/app/logs
    networks:
      - quant-network

  notify-service:
    build:
      context: .
      dockerfile: services/notify-service/Dockerfile
    container_name: quant-notify
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - notify_logs:/app/logs
    networks:
      - quant-network

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    container_name: quant-admin
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - admin_logs:/app/logs
      - market_data_logs:/app/logs/market-data:ro
      - factor_engine_logs:/app/logs/factor-engine:ro
      - strategy_logs:/app/logs/strategy:ro
      - notify_logs:/app/logs/notify:ro
    networks:
      - quant-network

  # Nginx 前端代理
  nginx:
    image: nginx:alpine
    container_name: quant-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./services/admin-service/src/main/resources/static:/usr/share/nginx/html:ro
    depends_on:
      - admin-service
      - xxl-job-admin
    networks:
      - quant-network

volumes:
  postgres_data:
    external: true
    name: ai-quant-stock_postgres_data
  redis_data:
  xxl_mysql_data:
  market_data_logs:
  factor_engine_logs:
  strategy_logs:
  notify_logs:
  admin_logs:

networks:
  quant-network:
    driver: bridge
